services:
  postgres:
    image: postgres:17
    profiles: ["postgres", "all"]
    ports: ["5432:5432"]
    environment:
      POSTGRES_USER: rowboat
      POSTGRES_PASSWORD: rowboat
      POSTGRES_DB: rowboat
    volumes:
      - ./dev/seed/postgres:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rowboat -d rowboat"]
      interval: 2s
      timeout: 3s
      retries: 15
  mysql:
    image: mysql:8
    profiles: ["mysql", "all"]
    ports: ["3306:3306"]
    environment:
      MYSQL_ROOT_PASSWORD: rowboat
      MYSQL_DATABASE: rowboat
      MYSQL_USER: rowboat
      MYSQL_PASSWORD: rowboat
    volumes:
      - ./dev/seed/mysql:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "rowboat", "-prowboat"]
      interval: 2s
      timeout: 3s
      retries: 30
  mariadb:
    image: mariadb:11
    profiles: ["mariadb", "all"]
    ports: ["3307:3306"]
    environment:
      MARIADB_ROOT_PASSWORD: rowboat
      MARIADB_DATABASE: rowboat
      MARIADB_USER: rowboat
      MARIADB_PASSWORD: rowboat
    volumes:
      - ./dev/seed/mariadb:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 2s
      timeout: 3s
      retries: 30
  cassandra:
    image: cassandra:5
    profiles: ["cassandra", "all"]
    ports: ["9042:9042"]
    environment:
      HEAP_NEWSIZE: 128M
      MAX_HEAP_SIZE: 1G
    healthcheck:
      test: ["CMD-SHELL", "cqlsh -e 'describe cluster' || exit 1"]
      interval: 5s
      timeout: 10s
      retries: 40
      start_period: 40s
  neo4j:
    image: neo4j:5
    profiles: ["neo4j", "all"]
    ports: ["7474:7474", "7687:7687"]
    environment:
      NEO4J_AUTH: neo4j/rowboatpass
    healthcheck:
      test: ["CMD-SHELL", "cypher-shell -u neo4j -p rowboatpass 'RETURN 1' || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 40
      start_period: 15s
  mongodb:
    image: mongo:7
    profiles: ["mongodb", "all"]
    ports: ["27017:27017"]
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping')"]
      interval: 2s
      timeout: 3s
      retries: 30
  elasticsearch:
    image: elasticsearch:8.15.0
    profiles: ["elasticsearch", "all"]
    ports: ["9200:9200"]
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: "-Xms512m -Xmx512m"
      # dev single-node: don't let the docker VM's disk usage block shard allocation
      cluster.routing.allocation.disk.threshold_enabled: "false"
    ulimits:
      memlock: { soft: -1, hard: -1 }
    # no healthcheck: the seed script retries until the HTTP port answers
  redis:
    image: redis:7-alpine
    profiles: ["redis", "all"]
    ports: ["6379:6379"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 3s
      retries: 15
  dynamodb:
    image: amazon/dynamodb-local
    profiles: ["dynamo", "all"]
    ports: ["8000:8000"]
    # no healthcheck: image ships no curl/wget — the seed script retries until the port answers
  mssql:
    image: mcr.microsoft.com/mssql/server:2022-latest
    profiles: ["mssql", "all"]
    ports: ["1433:1433"]
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "Rowboat!Pass1"
      MSSQL_PID: "Developer"
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P \"$$MSSQL_SA_PASSWORD\" -C -Q 'SELECT 1' || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 40
      start_period: 20s
  clickhouse:
    image: clickhouse/clickhouse-server:24
    profiles: ["clickhouse", "all"]
    ports: ["8123:8123"]
    environment:
      CLICKHOUSE_DB: rowboat
    ulimits:
      nofile: { soft: 262144, hard: 262144 }
    volumes:
      - ./dev/seed/clickhouse:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD", "clickhouse-client", "--query", "SELECT 1"]
      interval: 2s
      timeout: 3s
      retries: 30
