services:
  postgres:
    image: postgres:17
    profiles: ["postgres", "all"]
    ports: ["5432:5432"]
    environment:
      POSTGRES_USER: tuplebase
      POSTGRES_PASSWORD: tuplebase
      POSTGRES_DB: tuplebase
    healthcheck:
      # TCP (127.0.0.1, not the socket): the entrypoint's temporary init server
      # listens on the socket only, so this stays red until the final server is up.
      test: ["CMD-SHELL", "pg_isready -h 127.0.0.1 -U tuplebase -d tuplebase"]
      interval: 2s
      timeout: 3s
      retries: 30
  mysql:
    image: mysql:8
    profiles: ["mysql", "all"]
    ports: ["3306:3306"]
    environment:
      MYSQL_ROOT_PASSWORD: tuplebase
      MYSQL_DATABASE: tuplebase
      MYSQL_USER: tuplebase
      MYSQL_PASSWORD: tuplebase
    healthcheck:
      # query over TCP (127.0.0.1, not the socket) as the real user — this only
      # passes once the final networked server is up, not the temporary init
      # server the socket-based `mysqladmin ping` would report healthy too early.
      test: ["CMD-SHELL", "mysql -h 127.0.0.1 -u tuplebase -ptuplebase tuplebase -e 'SELECT 1' >/dev/null 2>&1 || exit 1"]
      interval: 3s
      timeout: 5s
      retries: 40
      start_period: 10s
  mariadb:
    image: mariadb:11
    profiles: ["mariadb", "all"]
    ports: ["3307:3306"]
    environment:
      MARIADB_ROOT_PASSWORD: tuplebase
      MARIADB_DATABASE: tuplebase
      MARIADB_USER: tuplebase
      MARIADB_PASSWORD: tuplebase
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 2s
      timeout: 3s
      retries: 30
  cassandra:
    image: cassandra:5
    profiles: ["cassandra", "all"]
    ports: ["9042:9042"]
    environment:
      HEAP_NEWSIZE: 128M
      MAX_HEAP_SIZE: 1G
    healthcheck:
      test: ["CMD-SHELL", "cqlsh -e 'describe cluster' || exit 1"]
      interval: 5s
      timeout: 10s
      retries: 40
      start_period: 40s
  neo4j:
    image: neo4j:5
    profiles: ["neo4j", "all"]
    ports: ["7474:7474", "7687:7687"]
    environment:
      NEO4J_AUTH: neo4j/tuplebasepass
    healthcheck:
      test: ["CMD-SHELL", "cypher-shell -u neo4j -p tuplebasepass 'RETURN 1' || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 40
      start_period: 15s
  mongodb:
    image: mongo:7
    profiles: ["mongodb", "all"]
    ports: ["27017:27017"]
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping')"]
      interval: 2s
      timeout: 3s
      retries: 30
  elasticsearch:
    image: elasticsearch:8.15.0
    profiles: ["elasticsearch", "all"]
    ports: ["9200:9200"]
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: "-Xms512m -Xmx512m"
      # dev single-node: don't let the docker VM's disk usage block shard allocation
      cluster.routing.allocation.disk.threshold_enabled: "false"
    ulimits:
      memlock: { soft: -1, hard: -1 }
    # no healthcheck: the seed script retries until the HTTP port answers
  kafka:
    image: apache/kafka:3.8.0
    profiles: ["kafka", "all"]
    ports: ["9092:9092"]
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@localhost:9093
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
    healthcheck:
      # broker is ready once the admin API answers — lets `--wait` gate the seed
      # so it connects to a live broker instead of burning retry-backoff on boot
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list >/dev/null 2>&1 || exit 1"]
      interval: 5s
      timeout: 10s
      retries: 30
      start_period: 10s
  redis:
    image: redis:7-alpine
    profiles: ["redis", "all"]
    ports: ["6379:6379"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 3s
      retries: 15
  dynamodb:
    image: amazon/dynamodb-local
    profiles: ["dynamo", "all"]
    ports: ["8000:8000"]
    # no healthcheck: image ships no curl/wget — the seed script retries until the port answers
  mssql:
    image: mcr.microsoft.com/mssql/server:2022-latest
    # image is amd64-only; run under emulation on arm64 hosts (Apple Silicon)
    platform: linux/amd64
    profiles: ["mssql", "all"]
    ports: ["1433:1433"]
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "TupleBase!Pass1"
      MSSQL_PID: "Developer"
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P \"$$MSSQL_SA_PASSWORD\" -C -Q 'SELECT 1' || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 40
      start_period: 20s
  clickhouse:
    image: clickhouse/clickhouse-server:24
    profiles: ["clickhouse", "all"]
    ports: ["8123:8123"]
    environment:
      CLICKHOUSE_DB: tuplebase
    ulimits:
      nofile: { soft: 262144, hard: 262144 }
    healthcheck:
      test: ["CMD", "clickhouse-client", "--query", "SELECT 1"]
      interval: 2s
      timeout: 3s
      retries: 30
