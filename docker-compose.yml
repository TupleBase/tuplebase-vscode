services:
  postgres:
    image: postgres:17
    profiles: ["postgres", "all"]
    ports: ["5432:5432"]
    environment:
      POSTGRES_USER: rowboat
      POSTGRES_PASSWORD: rowboat
      POSTGRES_DB: rowboat
    volumes:
      - ./dev/seed/postgres:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rowboat -d rowboat"]
      interval: 2s
      timeout: 3s
      retries: 15
  redis:
    image: redis:7-alpine
    profiles: ["redis", "all"]
    ports: ["6379:6379"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 3s
      retries: 15
  dynamodb:
    image: amazon/dynamodb-local
    profiles: ["dynamo", "all"]
    ports: ["8000:8000"]
    # no healthcheck: image ships no curl/wget — the seed script retries until the port answers
